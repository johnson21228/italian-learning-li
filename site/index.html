<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Italian Classroom Notes</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="app-header">
    <p class="eyebrow">Italian Learning LI</p>
    <h1>Classroom Notes</h1>
    <p class="lede">Tap Speak to hear Italian. The Italian words are real selectable text.</p>
  </header>

  <section class="controls" aria-label="Practice controls">
    <label class="toggle-row">
      <input id="showEnglish" type="checkbox" checked>
      <span>Show English</span>
    </label>

    <label class="voice-row">
      <span>Italian voice</span>
      <select id="voiceSelect" aria-label="Italian voice"></select>
    </label>
    <p id="voiceStatus" class="voice-status">Loading voices…</p>
  </section>

  <section class="filter-panel" aria-label="Vocabulary filters">
    <div id="filterChips" class="filter-chips" role="list" aria-label="Filter vocabulary"></div>
    <div class="pager-row" aria-live="polite">
      <p id="resultStatus" class="result-status">Loading vocabulary…</p>
      <div class="pager-controls" aria-label="Card pagination">
        <button id="prevPage" class="pager-button" type="button">← Prev</button>
        <button id="nextPage" class="pager-button" type="button">Next →</button>
      </div>
    </div>
  </section>

  <main>
    <section id="cards" class="cards" aria-live="polite"></section>
  </main>

  <footer class="footer">
    Static classroom notes site. Ready for GitHub Pages.
  </footer>

  <script src="js/vocabulary-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
